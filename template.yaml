AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: bitsa

Globals:
  Function:
    Timeout: 500

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
      - stg
      - qa
    Description: Deployment stage (dev, stg, qa, or prod)

  LambdaRoleArn:
    Type: String
    Default: arn:aws:iam::785000992152:role/BitsaRole
    Description: IAM Role ARN for Lambda execution

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "bits-${Stage}"
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET, POST, PUT, DELETE, OPTIONS'"
        AllowHeaders: "'AUTHORIZATION, Content-Type, X-Amz-Date, X-Api-Key, X-Amz-Security-Token, X-Amz-User-Agent'"
        AllowOrigin: "'*'"

  CloudWatchPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "CloudWatchLogsPolicy"
      Roles:
        - BitsaRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: "arn:aws:logs:*:*:*"

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "bits-app-user"
      Handler: lambda.app.lambda_handler
      Runtime: python3.12
      Role: !Ref LambdaRoleArn
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 500
      Environment:
        Variables:
          TZ: Asia/Kolkata
          STAGE: !Ref Stage
      Events:
        BitsaaApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY

  EmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "bits-app-email"
      Handler: lambda.email.lambda_handler
      Runtime: python3.12
      Role: !Ref LambdaRoleArn
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 500
      Environment:
        Variables:
          TZ: Asia/Kolkata
          IMAP_SERVER: "mail.uskcorp.in"
          IMAP_PORT: "993"
          EMAIL_USER: "hr@uskcorp.in"
          EMAIL_PASSWORD: "Infosys@123"

Outputs:
  UserFunctionApi:
    Description: "API Gateway endpoint URL for ${Stage} stage"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/"

  UserFunction:
    Description: "Lambda Function ARN"
    Value: !GetAtt UserFunction.Arn
